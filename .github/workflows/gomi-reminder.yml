name: Gomi Reminder

on:
  schedule:
    # GitHub Actions の cron は UTC 基準。さらに混雑時は数時間遅延する。
    # 03:30 UTC = 日本時間 12:30。最大10時間遅れても 22:30 JST までに収まり、
    # 「前日のうちに」確実に配信される（深夜にズレて日付が変わるのを防ぐ）。
    - cron: '30 3 * * *'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run gomi reminder
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_IDS: ${{ secrets.LINE_USER_IDS }}
        run: python main.py --mode real --once
